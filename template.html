<!DOCTYPE html>
<html>
<head>
<style>
.video {
	margin-top: 10px;
}
</style>
</head>
<body>

<div id="buttons"></div>
{1}

<div id="player" class="video">
<iframe width="560" height="315" style="position: fixed; right: 0; top: 0;"
src=""
frameborder="0" allowfullscreen>
</iframe>
</div>


<script>
{2}
function toggle_video(button, id) {
	const element = document.getElementById("player");
	const iframe = element.querySelector("iframe");
	iframe.src = "https://www.youtube.com/embed/" + url_arr[Number(id)];

	navigator.clipboard.writeText(`{ "file": "${button.innerText} [${url_arr[id]}]", },`);
}
</script>

</body>
</html>
